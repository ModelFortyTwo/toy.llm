<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        
        .phone {
            background: #333;
            border-radius: 10px;
            padding: 30px 20px 40px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 2px 5px rgba(255,255,255,0.1);
        }
        
        .screen {
            background: #9bbc0f;
            border: 4px solid #222;
            border-radius: 5px;
            position: relative;
        }
        
        canvas {
            display: block;
        }
        
        .nokia-text {
            color: #0f380f;
            font-weight: bold;
        }
        
        .score-display {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: #8bac0f;
            border-bottom: 2px solid #0f380f;
            font-size: 14px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 25px;
            max-width: 150px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .key {
            width: 40px;
            height: 40px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 18px;
            box-shadow: 0 3px 0 #111;
        }
        
        .key:active {
            box-shadow: 0 1px 0 #111;
            transform: translateY(2px);
        }
        
        .key.empty {
            background: transparent;
            box-shadow: none;
        }
        
        .instructions {
            color: #666;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
        
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(155, 188, 15, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
        }
        
        .game-over-overlay.show {
            display: flex;
        }
        
        .game-over-text {
            font-size: 20px;
            font-weight: bold;
            color: #0f380f;
            margin-bottom: 10px;
        }
        
        .restart-text {
            font-size: 12px;
            color: #0f380f;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="score-display">
                <span class="nokia-text">SNAKE</span>
                <span class="nokia-text" id="score">0</span>
            </div>
            <canvas id="gameCanvas" width="240" height="180"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">GAME OVER</div>
                <div class="restart-text">Press any key to restart</div>
            </div>
        </div>
        <div class="keypad">
            <div class="key empty"></div>
            <div class="key">▲</div>
            <div class="key empty"></div>
            <div class="key">◄</div>
            <div class="key">▼</div>
            <div class="key">►</div>
            <div class="key"></div>
            <div class="key">●</div>
            <div class="key"></div>
        </div>
    </div>
    <div class="instructions">Use arrow keys to control the snake</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        
        const GRID_SIZE = 12;
        const GRID_WIDTH = canvas.width / GRID_SIZE;
        const GRID_HEIGHT = canvas.height / GRID_SIZE;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameLoop = null;
        let gameRunning = false;
        
        function initGame() {
            snake = [
                { x: 5, y: 8 },
                { x: 4, y: 8 },
                { x: 3, y: 8 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            spawnFood();
            gameOverOverlay.classList.remove('show');
            gameRunning = true;
        }
        
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_WIDTH);
                food.y = Math.floor(Math.random() * GRID_HEIGHT);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }
        
        function drawPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * GRID_SIZE, y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);
        }
        
        function draw() {
            ctx.fillStyle = '#9bbc0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            snake.forEach((segment, index) => {
                const color = index === 0 ? '#0f380f' : '#306230';
                drawPixel(segment.x, segment.y, color);
            });
            
            drawPixel(food.x, food.y, '#0f380f');
        }
        
        function update() {
            if (!gameRunning) return;
            
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= GRID_WIDTH || head.y < 0 || head.y >= GRID_HEIGHT) {
                gameOver();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function gameOver() {
            gameRunning = false;
            gameOverOverlay.classList.add('show');
        }
        
        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            initGame();
            draw();
            gameLoop = setInterval(update, 100);
        }
        
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (!gameRunning && gameOverOverlay.classList.contains('show')) {
                startGame();
                return;
            }
            
            switch (key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });
        
        startGame();
    </script>
</body>
</html>
