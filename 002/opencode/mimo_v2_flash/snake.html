<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokia Snake</title>
    <style>
        body {
            background-color: #bbada0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #333;
        }
        .container {
            text-align: center;
        }
        canvas {
            background-color: #2e7d32;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .score-board {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="score-board">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // Game settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = true;
        let gameLoop;

        function init() {
            document.addEventListener('keydown', changeDirection);
            gameLoop = setInterval(update, 100);
        }

        function update() {
            if (!gameRunning) return;

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            for (let part of snake) {
                if (part.x === head.x && part.y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#006400' : '#32cd32';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                
                // Eyes for the head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    // Simple eye positioning logic based on direction
                    // Left/Right
                    if (dx !== 0) {
                        ctx.fillRect(part.x * gridSize + 5, part.y * gridSize + 4, 4, 4);
                        ctx.fillRect(part.x * gridSize + 5, part.y * gridSize + 12, 4, 4);
                    } 
                    // Up/Down
                    else {
                        ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 5, 4, 4);
                        ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 5, 4, 4);
                    }
                }
            });

            // Draw food
            ctx.fillStyle = '#e53935';
            ctx.beginPath();
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            ctx.arc(centerX, centerY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function generateFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);

                validPosition = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        function changeDirection(event) {
            const key = event.key;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if (key === 'ArrowUp' && !goingDown) {
                dx = 0;
                dy = -1;
            } else if (key === 'ArrowDown' && !goingUp) {
                dx = 0;
                dy = 1;
            } else if (key === 'ArrowLeft' && !goingRight) {
                dx = -1;
                dy = 0;
            } else if (key === 'ArrowRight' && !goingLeft) {
                dx = 1;
                dy = 0;
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            // Flash score
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
        }

        init();
    </script>
</body>
</html>
