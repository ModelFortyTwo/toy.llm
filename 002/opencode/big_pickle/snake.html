<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        @font-face {
            font-family: 'Nokia';
            src: url('https://cdnjs.cloudflare.com/ajax/libs/font-source-sans/3.0.6/source-sans-3.woff2') format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }

        .phone {
            background: #2d2d3a;
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
        }

        .screen-border {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 8px;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.8);
        }

        .screen {
            background: #9bbc0f;
            border-radius: 4px;
            width: 240px;
            height: 240px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        canvas {
            display: block;
        }

        .brand {
            color: #666;
            font-size: 10px;
            text-align: center;
            margin-top: 15px;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .nokia-text {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .score-display {
            position: absolute;
            top: 5px;
            left: 8px;
            color: #0f380f;
            font-size: 12px;
            font-weight: bold;
            z-index: 5;
        }

        .high-score {
            position: absolute;
            top: 5px;
            right: 8px;
            color: #0f380f;
            font-size: 12px;
            font-weight: bold;
            z-index: 5;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f380f;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            z-index: 5;
            display: none;
        }

        .game-over span {
            display: block;
            font-size: 10px;
            margin-top: 10px;
            font-weight: normal;
        }

        .start-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f380f;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            z-index: 5;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 20px;
            max-width: 180px;
            margin-left: auto;
            margin-right: auto;
        }

        .key {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #3d3d4a, #252530);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 18px;
            box-shadow: 
                0 4px 0 #1a1a22,
                0 6px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            user-select: none;
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 #1a1a22,
                0 3px 5px rgba(0, 0, 0, 0.3);
        }

        .key-center {
            grid-column: 2;
        }

        .key-up { grid-column: 2; }
        .key-left { grid-column: 1; grid-row: 2; }
        .key-down { grid-column: 2; grid-row: 2; }
        .key-right { grid-column: 3; grid-row: 2; }
        .key-enter { grid-column: 2; grid-row: 3; width: 80px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen-border">
            <div class="screen">
                <div class="score-display">SCORE: <span id="score">0</span></div>
                <div class="high-score">HI: <span id="highScore">0</span></div>
                <div class="start-message" id="startMsg">PRESS ENTER<br>TO START</div>
                <div class="game-over" id="gameOver">GAME OVER<span>Press Enter</span></div>
                <canvas id="gameCanvas" width="240" height="240"></canvas>
            </div>
        </div>
        <div class="nokia-text">SNAKE</div>
        <div class="brand">NOKIA</div>
        
        <div class="keypad">
            <div class="key key-up">▲</div>
            <div class="key key-left">◄</div>
            <div class="key key-down">▼</div>
            <div class="key key-right">►</div>
            <div class="key key-enter" id="enterKey">ENTER</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startMsg = document.getElementById('startMsg');
        const gameOverEl = document.getElementById('gameOver');
        const enterKey = document.getElementById('enterKey');

        const gridSize = 12;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop = null;
        let speed = 120;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 120;
            scoreEl.textContent = score;
            spawnFood();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function draw() {
            ctx.fillStyle = '#9bbc0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f380f';
            snake.forEach((seg, i) => {
                const size = gridSize - 1;
                ctx.fillRect(seg.x * gridSize + 1, seg.y * gridSize + 1, size, size);
            });

            ctx.fillStyle = '#0f380f';
            const foodSize = gridSize - 2;
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, foodSize, foodSize);
        }

        function update() {
            direction = { ...nextDirection };

            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
                
                if (score % 50 === 0 && speed > 50) {
                    speed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            gameOverEl.style.display = 'block';
        }

        function startGame() {
            if (gameRunning) return;
            
            initGame();
            gameRunning = true;
            startMsg.style.display = 'none';
            gameOverEl.style.display = 'none';
            draw();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, speed);
        }

        function handleDirection(dx, dy) {
            if (!gameRunning) return;
            if (direction.x === -dx && direction.y === -dy) return;
            nextDirection = { x: dx, y: dy };
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    handleDirection(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    handleDirection(0, 1);
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    handleDirection(-1, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    handleDirection(1, 0);
                    e.preventDefault();
                    break;
                case 'Enter':
                    startGame();
                    e.preventDefault();
                    break;
            }
        });

        document.querySelector('.key-up').addEventListener('click', () => handleDirection(0, -1));
        document.querySelector('.key-down').addEventListener('click', () => handleDirection(0, 1));
        document.querySelector('.key-left').addEventListener('click', () => handleDirection(-1, 0));
        document.querySelector('.key-right').addEventListener('click', () => handleDirection(1, 0));
        enterKey.addEventListener('click', startGame);

        initGame();
        draw();
    </script>
</body>
</html>
