<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nokia Snake</title>
  <style>
    :root {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #dbe8ff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #2f69c1, #050505 72%);
      color: inherit;
    }

    .nokia-shell {
      width: min(95vw, 420px);
      padding: 1.3rem 1.2rem 1.6rem;
      background: linear-gradient(180deg, #151515, #040405 70%);
      border-radius: 30px;
      border: 4px solid #5f5f5f;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.85);
      text-align: center;
    }

    .title-bar {
      text-transform: uppercase;
      letter-spacing: 0.4rem;
      font-size: 0.85rem;
      color: #7fb2ff;
      margin-bottom: 0.6rem;
    }

    .display {
      position: relative;
      padding: 0.45rem;
      border-radius: 18px;
      background: linear-gradient(180deg, #0b1b34, #020202);
      border: 3px solid #1a3b68;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.8);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      background: #010202;
      image-rendering: pixelated;
      box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.05);
    }

    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: rgba(2, 4, 16, 0.87);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      font-size: 0.85rem;
      color: #c8d8ff;
    }

    .overlay small {
      font-size: 0.6rem;
      letter-spacing: 0.35rem;
      margin-top: 0.35rem;
      color: #7bd8ff;
    }

    .overlay.hidden {
      display: none;
    }

    .scoreboard {
      margin-top: 0.9rem;
      display: flex;
      justify-content: space-between;
      text-transform: uppercase;
      letter-spacing: 0.2rem;
      font-size: 0.8rem;
    }

    .score-block span {
      display: block;
      font-size: 1.4rem;
      letter-spacing: 0.35rem;
      margin-top: 0.1rem;
    }

    .caption {
      margin: 0.65rem 0 0;
      font-size: 0.65rem;
      letter-spacing: 0.4rem;
      text-transform: uppercase;
      color: #9fb4cf;
    }

    @media (max-width: 360px) {
      .scoreboard {
        flex-direction: column;
        gap: 0.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="nokia-shell">
    <div class="title-bar">Nokia 3310 Snake</div>
    <div class="display">
      <canvas id="snakeCanvas" width="320" height="320" tabindex="0" aria-label="Classic Nokia snake board"></canvas>
      <div id="overlay" class="overlay">
        <p>Press Enter to start</p>
        <small>arrow keys · wasd</small>
      </div>
    </div>
    <div class="scoreboard">
      <div class="score-block">Score <span id="score">0</span></div>
      <div class="score-block">High <span id="highScore">0</span></div>
    </div>
    <p class="caption">Eat dots · dodge walls · retro feel</p>
  </div>
  <script>
    (() => {
      'use strict';

      const canvas = document.getElementById('snakeCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highScore');
      const overlay = document.getElementById('overlay');
      const overlayText = overlay.querySelector('p');
      const overlayHint = overlay.querySelector('small');

      const tileSize = 16;
      const cols = Math.floor(canvas.width / tileSize);
      const rows = Math.floor(canvas.height / tileSize);
      const tickMs = 130;
      const highScoreKey = 'nokia-snake-high-score';

      const directions = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 },
        s: { x: 0, y: 1 },
        a: { x: -1, y: 0 },
        d: { x: 1, y: 0 }
      };

      const state = {
        snake: [],
        direction: { x: 1, y: 0 },
        nextDirection: { x: 1, y: 0 },
        food: { x: 0, y: 0 },
        score: 0,
        highScore: 0,
        running: false
      };

      const safeReadHighScore = () => {
        try {
          const stored = localStorage.getItem(highScoreKey);
          return stored ? parseInt(stored, 10) || 0 : 0;
        } catch {
          return 0;
        }
      };

      const safeWriteHighScore = (value) => {
        try {
          localStorage.setItem(highScoreKey, String(value));
        } catch {
          // ignore storage errors
        }
      };

      state.highScore = safeReadHighScore();

      const focusCanvas = () => {
        canvas.focus({ preventScroll: true });
      };

      const updateScoreboard = () => {
        scoreEl.textContent = state.score;
        highScoreEl.textContent = state.highScore;
      };

      const placeSnake = () => {
        const head = {
          x: Math.floor(cols / 2),
          y: Math.floor(rows / 2)
        };
        state.snake = [
          { ...head },
          { x: head.x - 1, y: head.y },
          { x: head.x - 2, y: head.y }
        ];
      };

      const spawnFood = () => {
        let nextFood;
        do {
          nextFood = {
            x: Math.floor(Math.random() * cols),
            y: Math.floor(Math.random() * rows)
          };
        } while (state.snake.some((segment) => segment.x === nextFood.x && segment.y === nextFood.y));
        state.food = nextFood;
      };

      const render = () => {
        ctx.fillStyle = '#030305';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#0b3b68';
        ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x += 1) {
          ctx.beginPath();
          ctx.moveTo(x * tileSize, 0);
          ctx.lineTo(x * tileSize, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= rows; y += 1) {
          ctx.beginPath();
          ctx.moveTo(0, y * tileSize);
          ctx.lineTo(canvas.width, y * tileSize);
          ctx.stroke();
        }

        ctx.fillStyle = '#ff9b00';
        ctx.fillRect(
          state.food.x * tileSize + 4,
          state.food.y * tileSize + 4,
          tileSize - 8,
          tileSize - 8
        );

        state.snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? '#b8ff91' : '#49d3ff';
          ctx.fillRect(
            segment.x * tileSize + 1,
            segment.y * tileSize + 1,
            tileSize - 2,
            tileSize - 2
          );
        });
      };

      const showOverlay = (text, hint) => {
        overlayText.textContent = text;
        overlayHint.textContent = hint;
        overlay.classList.remove('hidden');
      };

      const hideOverlay = () => {
        overlay.classList.add('hidden');
      };

      const prepareBoard = () => {
        state.direction = { x: 1, y: 0 };
        state.nextDirection = { ...state.direction };
        placeSnake();
        spawnFood();
        render();
      };

      const startGame = () => {
        state.score = 0;
        updateScoreboard();
        prepareBoard();
        state.running = true;
        hideOverlay();
        focusCanvas();
      };

      const setHighScore = (value) => {
        state.highScore = value;
        highScoreEl.textContent = value;
        safeWriteHighScore(value);
      };

      const endGame = () => {
        state.running = false;
        if (state.score > state.highScore) {
          setHighScore(state.score);
        }
        showOverlay('Game Over', 'Press Enter to restart');
      };

      const step = () => {
        state.direction = state.nextDirection;
        const head = {
          x: state.snake[0].x + state.direction.x,
          y: state.snake[0].y + state.direction.y
        };

        const hitsWall =
          head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
        const hitsSelf = state.snake.some(
          (segment) => segment.x === head.x && segment.y === head.y
        );

        if (hitsWall || hitsSelf) {
          endGame();
          return;
        }

        state.snake.unshift(head);

        if (head.x === state.food.x && head.y === state.food.y) {
          state.score += 1;
          updateScoreboard();
          spawnFood();
        } else {
          state.snake.pop();
        }

        render();
      };

      document.addEventListener('keydown', (event) => {
        const key = event.key;
        if (key === 'Enter') {
          if (!state.running) {
            startGame();
          }
          return;
        }

        const normalized = key.length === 1 ? key.toLowerCase() : key;
        const next = directions[key] || directions[normalized];

        if (!next) {
          return;
        }

        event.preventDefault();

        if (state.direction.x === -next.x && state.direction.y === -next.y) {
          return;
        }

        state.nextDirection = next;
      });

      canvas.addEventListener('click', focusCanvas);

      setInterval(() => {
        if (state.running) {
          step();
        }
      }, tickMs);

      prepareBoard();
      updateScoreboard();
      showOverlay('Press Enter to start', 'Arrow keys · WASD');
      focusCanvas();
    })();
  </script>
</body>
</html>
