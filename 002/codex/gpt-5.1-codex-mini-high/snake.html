<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nokia Snake</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #115fae, #080b17 65%);
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .game-wrapper {
      width: min(95vw, 480px);
      text-align: center;
      padding: 1.5rem 1rem 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 3vw, 2.35rem);
      letter-spacing: 0.25rem;
      text-transform: uppercase;
    }

    .scoreboard {
      margin-bottom: 0.75rem;
      font-size: 1rem;
      letter-spacing: 0.25rem;
      display: flex;
      justify-content: center;
      gap: 0.25rem;
    }

    .scoreboard span:last-child {
      font-family: 'Courier New', monospace;
      color: #76f2d7;
    }

    .game-area {
      position: relative;
      margin: 0 auto 0.25rem;
      width: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      border-radius: 0.9rem;
      border: 4px solid #0a2b42;
      background: #010b16;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.65);
    }

    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      border-radius: inherit;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.3rem;
      padding: 1rem;
      font-size: 0.9rem;
      gap: 0.5rem;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    #status.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .hint {
      font-size: 0.85rem;
      letter-spacing: 0.2rem;
      margin: 0;
      color: #a0b9d9;
    }

    @media (max-width: 400px) {
      .scoreboard {
        flex-direction: column;
        letter-spacing: 0.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>Nokia Snake</h1>
    <div class="scoreboard">Score: <span id="score">0</span></div>
    <div class="game-area">
      <canvas id="snakeCanvas" width="400" height="400" tabindex="0"></canvas>
      <div id="status" class="hidden"></div>
    </div>
    <p class="hint">Arrow keys or WASD · Enter restarts</p>
  </div>
  <script>
    (() => {
      const canvas = document.getElementById('snakeCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const statusEl = document.getElementById('status');
      const tileSize = 20;
      const cols = canvas.width / tileSize;
      const rows = canvas.height / tileSize;
      const tickMs = 120;
      const directions = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 },
        s: { x: 0, y: 1 },
        a: { x: -1, y: 0 },
        d: { x: 1, y: 0 }
      };

      let snake = [];
      let direction = { x: 1, y: 0 };
      let nextDirection = { ...direction };
      let food = { x: 0, y: 0 };
      let score = 0;
      let running = false;
      let loopId = 0;

      const focusCanvas = () => {
        canvas.focus({ preventScroll: true });
      };

      const showStatus = (text) => {
        statusEl.innerHTML = text.replace(/\n/g, '<br>');
        statusEl.classList.remove('hidden');
      };

      const hideStatus = () => {
        statusEl.classList.add('hidden');
        statusEl.innerHTML = '';
      };

      const spawnFood = () => {
        do {
          food = {
            x: Math.floor(Math.random() * cols),
            y: Math.floor(Math.random() * rows)
          };
        } while (snake.some((cell) => cell.x === food.x && cell.y === food.y));
      };

      const resetState = () => {
        snake = [
          {
            x: Math.floor(cols / 2),
            y: Math.floor(rows / 2)
          }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { ...direction };
        score = 0;
        scoreEl.textContent = score;
        spawnFood();
        running = true;
        hideStatus();
        render();
        focusCanvas();
      };

      const stopLoop = () => {
        running = false;
        clearInterval(loopId);
        loopId = 0;
      };

      const triggerGameOver = () => {
        stopLoop();
        showStatus(`Game over\nScore ${score}\nPress Enter to restart`);
      };

      const step = () => {
        direction = nextDirection;
        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        if (
          head.x < 0 ||
          head.x >= cols ||
          head.y < 0 ||
          head.y >= rows ||
          snake.some((segment) => segment.x === head.x && segment.y === head.y)
        ) {
          triggerGameOver();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = score;
          spawnFood();
        } else {
          snake.pop();
        }

        render();
      };

      const render = () => {
        ctx.fillStyle = '#010b16';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#071a2b';
        ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x++) {
          ctx.beginPath();
          ctx.moveTo(x * tileSize, 0);
          ctx.lineTo(x * tileSize, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= rows; y++) {
          ctx.beginPath();
          ctx.moveTo(0, y * tileSize);
          ctx.lineTo(canvas.width, y * tileSize);
          ctx.stroke();
        }

        ctx.fillStyle = '#f97316';
        ctx.fillRect(
          food.x * tileSize + 4,
          food.y * tileSize + 4,
          tileSize - 8,
          tileSize - 8
        );

        snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? '#a8ff9b' : '#52b6d1';
          ctx.fillRect(
            segment.x * tileSize + 2,
            segment.y * tileSize + 2,
            tileSize - 4,
            tileSize - 4
          );
        });
      };

      const startLoop = () => {
        if (loopId) {
          clearInterval(loopId);
        }
        loopId = setInterval(() => {
          if (running) {
            step();
          }
        }, tickMs);
      };

      document.addEventListener('keydown', (event) => {
        const key = event.key;

        if (!running && (key === 'Enter' || key === ' ')) {
          resetState();
          startLoop();
          return;
        }

        const normalizedKey = key.length === 1 ? key.toLowerCase() : key;
        const next = directions[normalizedKey] || directions[key];

        if (next) {
          if (direction.x === -next.x && direction.y === -next.y) {
            return;
          }
          nextDirection = next;
        }
      });

      canvas.addEventListener('click', focusCanvas);

      resetState();
      startLoop();
    })();
  </script>
</body>
</html>
