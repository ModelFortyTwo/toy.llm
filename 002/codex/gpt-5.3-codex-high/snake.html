<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokia Snake</title>
  <style>
    :root {
      --lcd-light: #cfd9b0;
      --lcd-mid: #9dae7a;
      --lcd-dark: #283427;
      --lcd-deep: #1a2118;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #2d2d2d, #111);
      font-family: "Courier New", Courier, monospace;
      color: var(--lcd-dark);
    }

    .phone {
      width: min(92vw, 520px);
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(160deg, #b8b8b8, #8e8e8e 55%, #7a7a7a);
      border: 2px solid #5f5f5f;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.45), inset 0 2px 4px rgba(255, 255, 255, 0.35);
    }

    .screen {
      background: linear-gradient(180deg, var(--lcd-light), #bccb9a);
      border: 8px solid #676767;
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 2px #8a8a8a;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      color: var(--lcd-deep);
      font-size: clamp(12px, 2.8vw, 16px);
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: pixelated;
      border: 2px solid var(--lcd-dark);
      background: var(--lcd-light);
    }

    .controls {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--lcd-deep);
      font-size: clamp(11px, 2.6vw, 14px);
    }

    button {
      appearance: none;
      border: 2px solid #4c4c4c;
      border-radius: 8px;
      padding: 6px 10px;
      background: linear-gradient(180deg, #c9c9c9, #ababab);
      color: #1e1e1e;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Nokia Snake game">
    <section class="screen">
      <div class="hud">
        <span id="score">Score: 0</span>
        <span id="best">Best: 0</span>
      </div>
      <canvas id="game" width="360" height="360" aria-label="Snake game board"></canvas>
      <div class="controls">
        <span>Arrows / WASD • Enter, Space, or R to restart</span>
        <button id="restart" type="button">Restart</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const COLS = 18;
      const ROWS = 18;
      const TILE = 20;
      const SPEED_MS = 110;

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const restartBtn = document.getElementById("restart");

      const COLOR_BG = "#cfd9b0";
      const COLOR_GRID = "#b9c697";
      const COLOR_SNAKE = "#1a2118";
      const COLOR_SNAKE_HEAD = "#2a3626";
      const COLOR_FOOD = "#1f2b1c";
      const COLOR_TEXT = "#1a2118";

      let snake;
      let direction;
      let pendingDirection;
      let food;
      let score;
      let best = Number(localStorage.getItem("snake-best") || 0);
      let gameOver;
      let timer;

      const keyToDir = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        KeyW: { x: 0, y: -1 },
        KeyS: { x: 0, y: 1 },
        KeyA: { x: -1, y: 0 },
        KeyD: { x: 1, y: 0 }
      };

      function cloneDir(dir) {
        return { x: dir.x, y: dir.y };
      }

      function isOpposite(a, b) {
        return a.x + b.x === 0 && a.y + b.y === 0;
      }

      function randomFood() {
        while (true) {
          const candidate = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS)
          };

          const onSnake = snake.some((segment) => segment.x === candidate.x && segment.y === candidate.y);
          if (!onSnake) {
            return candidate;
          }
        }
      }

      function syncHud() {
        scoreEl.textContent = "Score: " + score;
        bestEl.textContent = "Best: " + best;
      }

      function resetGame() {
        snake = [
          { x: 9, y: 9 },
          { x: 8, y: 9 },
          { x: 7, y: 9 }
        ];
        direction = { x: 1, y: 0 };
        pendingDirection = cloneDir(direction);
        food = randomFood();
        score = 0;
        gameOver = false;
        syncHud();
        render();
      }

      function endGame() {
        gameOver = true;
        if (score > best) {
          best = score;
          localStorage.setItem("snake-best", String(best));
          syncHud();
        }
        render();
      }

      function tick() {
        if (gameOver) {
          return;
        }

        direction = cloneDir(pendingDirection);
        const head = snake[0];
        const next = { x: head.x + direction.x, y: head.y + direction.y };
        const grows = next.x === food.x && next.y === food.y;

        const hitWall = next.x < 0 || next.y < 0 || next.x >= COLS || next.y >= ROWS;
        const bodyToCheck = grows ? snake : snake.slice(0, -1);
        const hitSelf = bodyToCheck.some((segment) => segment.x === next.x && segment.y === next.y);

        if (hitWall || hitSelf) {
          endGame();
          return;
        }

        snake.unshift(next);

        if (grows) {
          score += 1;
          food = randomFood();
          if (score > best) {
            best = score;
            localStorage.setItem("snake-best", String(best));
          }
          syncHud();
        } else {
          snake.pop();
        }

        render();
      }

      function drawGrid() {
        ctx.fillStyle = COLOR_BG;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = COLOR_GRID;
        ctx.lineWidth = 1;

        for (let x = 0; x <= COLS; x += 1) {
          ctx.beginPath();
          ctx.moveTo(x * TILE + 0.5, 0);
          ctx.lineTo(x * TILE + 0.5, canvas.height);
          ctx.stroke();
        }

        for (let y = 0; y <= ROWS; y += 1) {
          ctx.beginPath();
          ctx.moveTo(0, y * TILE + 0.5);
          ctx.lineTo(canvas.width, y * TILE + 0.5);
          ctx.stroke();
        }
      }

      function drawSnake() {
        snake.forEach((segment, index) => {
          const inset = index === 0 ? 2 : 3;
          ctx.fillStyle = index === 0 ? COLOR_SNAKE_HEAD : COLOR_SNAKE;
          ctx.fillRect(
            segment.x * TILE + inset,
            segment.y * TILE + inset,
            TILE - inset * 2,
            TILE - inset * 2
          );
        });
      }

      function drawFood() {
        const pulse = (Date.now() % 600) / 600;
        const size = 6 + Math.floor(pulse * 4);
        const offset = Math.floor((TILE - size) / 2);

        ctx.fillStyle = COLOR_FOOD;
        ctx.fillRect(food.x * TILE + offset, food.y * TILE + offset, size, size);
      }

      function drawGameOver() {
        ctx.fillStyle = "rgba(207, 217, 176, 0.88)";
        ctx.fillRect(0, canvas.height / 2 - 46, canvas.width, 92);

        ctx.fillStyle = COLOR_TEXT;
        ctx.textAlign = "center";
        ctx.font = "bold 22px Courier New";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "bold 14px Courier New";
        ctx.fillText("Press Enter / Space / R", canvas.width / 2, canvas.height / 2 + 20);
      }

      function render() {
        drawGrid();
        drawFood();
        drawSnake();

        if (gameOver) {
          drawGameOver();
        }
      }

      function handleDirectionInput(nextDir) {
        if (gameOver) {
          return;
        }

        if (!isOpposite(nextDir, direction)) {
          pendingDirection = cloneDir(nextDir);
        }
      }

      window.addEventListener("keydown", (event) => {
        const restartKeys = event.code === "Enter" || event.code === "Space" || event.code === "KeyR";
        if (restartKeys && gameOver) {
          event.preventDefault();
          resetGame();
          return;
        }

        const nextDir = keyToDir[event.code];
        if (nextDir) {
          event.preventDefault();
          handleDirectionInput(nextDir);
        }
      });

      restartBtn.addEventListener("click", resetGame);

      syncHud();
      resetGame();
      clearInterval(timer);
      timer = setInterval(tick, SPEED_MS);
    })();
  </script>
</body>
</html>
