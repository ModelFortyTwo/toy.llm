<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casio fx-82MS Calculator</title>
  <style>
    :root {
      --body-a: #141b29;
      --body-b: #0b1018;
      --shell-a: #28364b;
      --shell-b: #1d283a;
      --line: #51627f;
      --display-bg: #a7bb95;
      --display-line: #46593b;
      --display-text: #15210f;
      --display-soft: #2a3a1f;
      --key: #334762;
      --key-num: #3d516e;
      --key-fn: #3a5879;
      --key-op: #4f6b91;
      --key-shift: #d39a27;
      --key-ac: #8b4347;
      --key-eq: #607f31;
      --white: #eff4fb;
    }

    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, var(--body-a) 0%, var(--body-b) 60%, #070b12 100%);
      color: var(--white);
      padding: 20px;
    }

    .calc {
      width: min(430px, 100%);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--shell-a), var(--shell-b));
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.4);
    }

    .top {
      padding: 12px 16px 8px;
      background: linear-gradient(180deg, #2f3e57, #26344a);
      border-bottom: 1px solid #5b6f8f;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      letter-spacing: 0.6px;
    }

    .top .brand {
      font-size: 17px;
      font-weight: 700;
    }

    .top .model {
      font-size: 14px;
      font-weight: 700;
      color: #c8d7ea;
    }

    .display {
      margin: 14px;
      border: 2px solid var(--display-line);
      border-radius: 8px;
      background: var(--display-bg);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      padding: 10px 12px;
      color: var(--display-text);
    }

    .ind {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--display-soft);
      margin-bottom: 4px;
    }

    .ind span {
      opacity: 0.4;
    }

    .ind span.on {
      opacity: 1;
    }

    .expr,
    .res {
      font-family: "Courier New", monospace;
      text-align: right;
      white-space: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .expr::-webkit-scrollbar,
    .res::-webkit-scrollbar {
      display: none;
    }

    .expr {
      min-height: 24px;
      font-size: 18px;
      color: #1a2a12;
    }

    .res {
      min-height: 38px;
      font-size: 30px;
      color: #101a0c;
    }

    .keys {
      padding: 0 14px 16px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 46px;
      padding: 5px 6px;
      background: var(--key);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.05;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.13);
      user-select: none;
    }

    button:active {
      transform: translateY(1px);
    }

    .num { background: var(--key-num); }
    .fn { background: var(--key-fn); }
    .op { background: var(--key-op); }
    .shift { background: var(--key-shift); color: #211400; }
    .ac { background: var(--key-ac); }
    .eq { background: var(--key-eq); }

    .sub {
      display: block;
      min-height: 10px;
      margin-top: 2px;
      font-size: 10px;
      opacity: 0.82;
      font-weight: 600;
    }

    @media (max-width: 420px) {
      button {
        min-height: 42px;
        font-size: 14px;
      }
      .res {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="calc" aria-label="Casio fx-82MS calculator">
    <header class="top">
      <div class="brand">CASIO</div>
      <div class="model">fx-82MS</div>
    </header>

    <section class="display">
      <div class="ind">
        <span id="shift-ind">SHIFT</span>
        <span id="mode-ind" class="on">DEG</span>
      </div>
      <div id="expr" class="expr"></div>
      <div id="res" class="res">0</div>
    </section>

    <section class="keys" id="keys">
      <button class="shift" data-action="shift">SHIFT</button>
      <button class="fn" data-action="drg">DRG<span class="sub">mode</span></button>
      <button class="fn" data-token="(">(</button>
      <button class="fn" data-token=")">)</button>
      <button class="fn" data-action="del">DEL</button>
      <button class="ac" data-action="ac">AC</button>

      <button class="fn fn-alt" data-primary="sin(" data-shift="asin(">sin<span class="sub">asin</span></button>
      <button class="fn fn-alt" data-primary="cos(" data-shift="acos(">cos<span class="sub">acos</span></button>
      <button class="fn fn-alt" data-primary="tan(" data-shift="atan(">tan<span class="sub">atan</span></button>
      <button class="fn fn-alt" data-primary="log(" data-shift="10^(">log<span class="sub">10^x</span></button>
      <button class="fn fn-alt" data-primary="ln(" data-shift="e^(">ln<span class="sub">e^x</span></button>
      <button class="fn" data-token="pi">pi</button>

      <button class="fn fn-alt" data-primary="sqrt(" data-shift="^2">sqrt<span class="sub">x^2</span></button>
      <button class="fn fn-alt" data-primary="^" data-shift="!">x^y<span class="sub">x!</span></button>
      <button class="fn" data-token="%">%</button>
      <button class="op" data-token="/">/</button>
      <button class="op" data-token="*">*</button>
      <button class="fn" data-action="ans">Ans</button>

      <button class="num" data-token="7">7</button>
      <button class="num" data-token="8">8</button>
      <button class="num" data-token="9">9</button>
      <button class="op" data-token="-">-</button>
      <button class="op" data-token="+">+</button>
      <button class="fn" data-action="neg">(-)</button>

      <button class="num" data-token="4">4</button>
      <button class="num" data-token="5">5</button>
      <button class="num" data-token="6">6</button>
      <button class="fn" data-token="e">e</button>
      <button class="fn" data-token="^(-1)">x^-1</button>
      <button class="fn" data-token="E">EXP</button>

      <button class="num" data-token="1">1</button>
      <button class="num" data-token="2">2</button>
      <button class="num" data-token="3">3</button>
      <button class="num" data-token="0">0</button>
      <button class="num" data-token=".">.</button>
      <button class="eq" data-action="eq">=</button>
    </section>
  </main>

  <script>
    const exprEl = document.getElementById("expr");
    const resEl = document.getElementById("res");
    const modeInd = document.getElementById("mode-ind");
    const shiftInd = document.getElementById("shift-ind");
    const keysEl = document.getElementById("keys");

    const ANGLE_MODES = ["DEG", "RAD", "GRAD"];
    let modeIndex = 0;
    let shift = false;
    let expr = "";
    let ans = 0;
    let lastPreview = "0";

    function factorial(value) {
      if (!Number.isFinite(value) || value < 0 || Math.floor(value) !== value) {
        throw new Error("Math ERROR");
      }
      let total = 1;
      for (let i = 2; i <= value; i += 1) total *= i;
      return total;
    }

    function toRadians(value) {
      const mode = ANGLE_MODES[modeIndex];
      if (mode === "DEG") return (value * Math.PI) / 180;
      if (mode === "GRAD") return (value * Math.PI) / 200;
      return value;
    }

    function fromRadians(value) {
      const mode = ANGLE_MODES[modeIndex];
      if (mode === "DEG") return (value * 180) / Math.PI;
      if (mode === "GRAD") return (value * 200) / Math.PI;
      return value;
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "Math ERROR";
      if (Object.is(value, -0)) value = 0;
      const abs = Math.abs(value);
      if (abs !== 0 && (abs >= 1e10 || abs < 1e-8)) {
        return value.toExponential(8).replace(/\.?(0+)e/, "e");
      }
      return Number(value.toPrecision(12)).toString();
    }

    function toDisplayExpression(text) {
      return text
        .replace(/\*/g, "x")
        .replace(/\//g, "/")
        .replace(/pi/g, "pi")
        .replace(/sqrt\(/g, "sqrt(");
    }

    function isValueToken(token) {
      return ["number", "const", "rparen", "postfix"].includes(token.kind);
    }

    function startsValue(token) {
      return ["number", "const", "ident", "lparen"].includes(token.kind);
    }

    function tokenize(input) {
      const out = [];
      let i = 0;

      while (i < input.length) {
        const c = input[i];

        if (c === " ") {
          i += 1;
          continue;
        }

        if (/[0-9.]/.test(c)) {
          let number = "";
          let dotCount = 0;
          while (i < input.length && /[0-9.]/.test(input[i])) {
            if (input[i] === ".") dotCount += 1;
            number += input[i];
            i += 1;
          }
          if (dotCount > 1 || number === ".") throw new Error("Syntax ERROR");

          if (i < input.length && input[i] === "E") {
            number += "E";
            i += 1;
            if (input[i] === "+" || input[i] === "-") {
              number += input[i];
              i += 1;
            }
            let expDigits = "";
            while (i < input.length && /[0-9]/.test(input[i])) {
              expDigits += input[i];
              i += 1;
            }
            if (!expDigits) throw new Error("Syntax ERROR");
            number += expDigits;
          }

          out.push({ kind: "number", value: Number(number) });
          continue;
        }

        if (/[A-Za-z]/.test(c)) {
          let word = "";
          while (i < input.length && /[A-Za-z]/.test(input[i])) {
            word += input[i];
            i += 1;
          }

          if (word === "pi" || word === "e" || word === "Ans") {
            out.push({ kind: "const", value: word });
          } else {
            out.push({ kind: "ident", value: word });
          }
          continue;
        }

        if (c === "(") {
          out.push({ kind: "lparen", value: c });
          i += 1;
          continue;
        }

        if (c === ")") {
          out.push({ kind: "rparen", value: c });
          i += 1;
          continue;
        }

        if (c === "!") {
          out.push({ kind: "postfix", value: "!" });
          i += 1;
          continue;
        }

        if (c === "%") {
          out.push({ kind: "postfix", value: "%" });
          i += 1;
          continue;
        }

        if ("+-*/^".includes(c)) {
          out.push({ kind: "op", value: c });
          i += 1;
          continue;
        }

        throw new Error("Syntax ERROR");
      }

      const withMul = [];
      for (let idx = 0; idx < out.length; idx += 1) {
        const cur = out[idx];
        withMul.push(cur);
        const next = out[idx + 1];
        if (!next) continue;

        if (isValueToken(cur) && startsValue(next)) {
          withMul.push({ kind: "op", value: "*" });
        }
      }

      return withMul;
    }

    function evaluate(input) {
      const tokens = tokenize(input);
      let pos = 0;

      function peek() {
        return tokens[pos];
      }

      function consume(expectedKind, expectedValue) {
        const token = tokens[pos];
        if (!token || token.kind !== expectedKind || (expectedValue !== undefined && token.value !== expectedValue)) {
          throw new Error("Syntax ERROR");
        }
        pos += 1;
        return token;
      }

      function parseExpression() {
        let value = parseTerm();
        while (peek() && peek().kind === "op" && (peek().value === "+" || peek().value === "-")) {
          const op = consume("op").value;
          const rhs = parseTerm();
          value = op === "+" ? value + rhs : value - rhs;
        }
        return value;
      }

      function parseTerm() {
        let value = parseUnary();
        while (peek() && peek().kind === "op" && (peek().value === "*" || peek().value === "/")) {
          const op = consume("op").value;
          const rhs = parseUnary();
          if (op === "*") value *= rhs;
          else value /= rhs;
        }
        return value;
      }

      function parseUnary() {
        if (peek() && peek().kind === "op" && (peek().value === "+" || peek().value === "-")) {
          const op = consume("op").value;
          const rhs = parseUnary();
          return op === "+" ? rhs : -rhs;
        }
        return parsePower();
      }

      function parsePower() {
        let left = parsePostfix();
        if (peek() && peek().kind === "op" && peek().value === "^") {
          consume("op", "^");
          const right = parsePower();
          left = Math.pow(left, right);
        }
        return left;
      }

      function parsePostfix() {
        let value = parsePrimary();

        while (peek() && peek().kind === "postfix") {
          const op = consume("postfix").value;
          if (op === "!") value = factorial(value);
          if (op === "%") value /= 100;
        }

        return value;
      }

      function parsePrimary() {
        const token = peek();
        if (!token) throw new Error("Syntax ERROR");

        if (token.kind === "number") {
          consume("number");
          return token.value;
        }

        if (token.kind === "const") {
          consume("const");
          if (token.value === "pi") return Math.PI;
          if (token.value === "e") return Math.E;
          if (token.value === "Ans") return ans;
          throw new Error("Syntax ERROR");
        }

        if (token.kind === "lparen") {
          consume("lparen");
          const inner = parseExpression();
          consume("rparen");
          return inner;
        }

        if (token.kind === "ident") {
          const fnName = consume("ident").value;
          consume("lparen");
          const arg = parseExpression();
          consume("rparen");

          if (fnName === "sin") return Math.sin(toRadians(arg));
          if (fnName === "cos") return Math.cos(toRadians(arg));
          if (fnName === "tan") return Math.tan(toRadians(arg));
          if (fnName === "asin") return fromRadians(Math.asin(arg));
          if (fnName === "acos") return fromRadians(Math.acos(arg));
          if (fnName === "atan") return fromRadians(Math.atan(arg));
          if (fnName === "log") return Math.log10(arg);
          if (fnName === "ln") return Math.log(arg);
          if (fnName === "sqrt") return Math.sqrt(arg);

          throw new Error("Syntax ERROR");
        }

        throw new Error("Syntax ERROR");
      }

      const value = parseExpression();
      if (pos !== tokens.length) throw new Error("Syntax ERROR");
      if (!Number.isFinite(value)) throw new Error("Math ERROR");
      return value;
    }

    function refreshDisplay() {
      exprEl.textContent = toDisplayExpression(expr);
      modeInd.textContent = ANGLE_MODES[modeIndex];
      shiftInd.classList.toggle("on", shift);
      if (!expr) resEl.textContent = "0";
    }

    function consumeShift() {
      if (shift) shift = false;
    }

    function preview() {
      if (!expr) {
        resEl.textContent = "0";
        lastPreview = "0";
        return;
      }
      try {
        const value = evaluate(expr);
        const formatted = formatNumber(value);
        resEl.textContent = formatted;
        lastPreview = formatted;
      } catch (error) {
        if (String(error.message).includes("Syntax")) {
          resEl.textContent = lastPreview;
        } else {
          resEl.textContent = "Math ERROR";
        }
      }
    }

    function appendToken(token) {
      expr += token;
      preview();
      refreshDisplay();
    }

    function runEquals() {
      if (!expr) return;
      try {
        const value = evaluate(expr);
        ans = value;
        const formatted = formatNumber(value);
        resEl.textContent = formatted;
        lastPreview = formatted;
        expr = formatted;
      } catch {
        resEl.textContent = "Math ERROR";
      }
      consumeShift();
      refreshDisplay();
    }

    function runAction(action) {
      if (action === "shift") {
        shift = !shift;
        refreshDisplay();
        return;
      }

      if (action === "drg") {
        modeIndex = (modeIndex + 1) % ANGLE_MODES.length;
        preview();
        refreshDisplay();
        return;
      }

      if (action === "ac") {
        expr = "";
        resEl.textContent = "0";
        lastPreview = "0";
        consumeShift();
        refreshDisplay();
        return;
      }

      if (action === "del") {
        expr = expr.slice(0, -1);
        preview();
        consumeShift();
        refreshDisplay();
        return;
      }

      if (action === "ans") {
        appendToken("Ans");
        consumeShift();
        refreshDisplay();
        return;
      }

      if (action === "neg") {
        appendToken("(-");
        consumeShift();
        refreshDisplay();
        return;
      }

      if (action === "eq") {
        runEquals();
      }
    }

    keysEl.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      if (action) {
        runAction(action);
        return;
      }

      if (button.classList.contains("fn-alt")) {
        const token = shift ? button.dataset.shift : button.dataset.primary;
        appendToken(token);
        consumeShift();
        refreshDisplay();
        return;
      }

      const token = button.dataset.token;
      if (!token) return;
      appendToken(token);
      consumeShift();
      refreshDisplay();
    });

    window.addEventListener("keydown", (event) => {
      const keyMap = {
        Enter: { action: "eq" },
        "=": { action: "eq" },
        Backspace: { action: "del" },
        Escape: { action: "ac" },
        "*": { token: "*" },
        x: { token: "*" },
        X: { token: "*" },
        "/": { token: "/" },
        "^": { token: "^" },
        "%": { token: "%" },
        "(": { token: "(" },
        ")": { token: ")" },
        p: { token: "pi" },
        P: { token: "pi" },
        e: { token: "e" }
      };

      if (keyMap[event.key]) {
        event.preventDefault();
        if (keyMap[event.key].action) {
          runAction(keyMap[event.key].action);
        } else {
          appendToken(keyMap[event.key].token);
          consumeShift();
          refreshDisplay();
        }
        return;
      }

      if (/[0-9.+-]/.test(event.key)) {
        event.preventDefault();
        appendToken(event.key);
        consumeShift();
        refreshDisplay();
      }
    });

    refreshDisplay();
  </script>
</body>
</html>
