<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casio fx-82MS Calculator</title>
  <style>
    :root {
      --bg: #0f1724;
      --panel: #1f2a3d;
      --panel-2: #25364f;
      --display: #d8ead1;
      --text: #e4edf6;
      --key: #2d3d56;
      --key-fn: #35506f;
      --key-num: #344966;
      --key-op: #4f6f95;
      --key-eq: #5f7a2a;
      --accent: #d08f1a;
      --warn: #8c3f46;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1a2940 0%, #0d1320 40%, #080d15 100%);
      color: var(--text);
      padding: 20px;
    }

    .calculator {
      width: min(430px, 100%);
      background: linear-gradient(180deg, var(--panel) 0%, #1b2638 100%);
      border-radius: 18px;
      box-shadow: 0 25px 50px -20px var(--shadow);
      border: 1px solid #3f526f;
      overflow: hidden;
    }

    .brand {
      padding: 12px 16px 6px;
      background: linear-gradient(180deg, #2c3a52, #243249);
      border-bottom: 1px solid #4a5d7d;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
    }

    .brand .name {
      font-weight: 700;
      letter-spacing: 0.8px;
      font-size: 17px;
    }

    .brand .model {
      font-weight: 700;
      color: #c6d4e4;
      font-size: 14px;
    }

    .display-wrap {
      background: #9eb188;
      margin: 14px;
      border-radius: 8px;
      border: 2px solid #364932;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      padding: 10px 12px;
    }

    .indicators {
      height: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #223112;
      font-size: 12px;
      font-weight: 700;
    }

    .indicator {
      opacity: 0.35;
    }

    .indicator.active {
      opacity: 1;
    }

    .expression {
      min-height: 26px;
      font-family: "Courier New", monospace;
      font-size: 18px;
      color: #16210d;
      text-align: right;
      white-space: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .expression::-webkit-scrollbar {
      display: none;
    }

    .result {
      min-height: 38px;
      font-family: "Courier New", monospace;
      font-size: 30px;
      color: #0f1909;
      text-align: right;
      white-space: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .result::-webkit-scrollbar {
      display: none;
    }

    .keys {
      padding: 0 14px 16px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 46px;
      padding: 4px 6px;
      color: #f3f7fc;
      background: var(--key);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.1;
      user-select: none;
    }

    button:active {
      transform: translateY(1px);
    }

    .k-fn { background: var(--key-fn); }
    .k-num { background: var(--key-num); }
    .k-op { background: var(--key-op); }
    .k-eq { background: var(--key-eq); }
    .k-shift { background: var(--accent); color: #1f1300; }
    .k-ac { background: var(--warn); }

    .sub {
      display: block;
      font-size: 10px;
      opacity: 0.82;
      margin-top: 2px;
      min-height: 10px;
    }

    @media (max-width: 420px) {
      button {
        min-height: 42px;
        font-size: 14px;
      }
      .result {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Casio fx-82MS calculator">
    <div class="brand">
      <div class="name">CASIO</div>
      <div class="model">fx-82MS</div>
    </div>

    <section class="display-wrap">
      <div class="indicators">
        <span class="indicator" id="shift-ind">SHIFT</span>
        <span class="indicator" id="mode-ind">DEG</span>
      </div>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </section>

    <section class="keys">
      <button class="k-shift" data-action="shift">SHIFT</button>
      <button class="k-fn" data-action="drg">DRG<span class="sub">mode</span></button>
      <button class="k-fn" data-token="(">(</button>
      <button class="k-fn" data-token=")">)</button>
      <button class="k-fn" data-action="del">DEL</button>
      <button class="k-ac" data-action="ac">AC</button>

      <button class="k-fn fn-key" data-primary="sin(" data-shift="asin(">sin<span class="sub">asin</span></button>
      <button class="k-fn fn-key" data-primary="cos(" data-shift="acos(">cos<span class="sub">acos</span></button>
      <button class="k-fn fn-key" data-primary="tan(" data-shift="atan(">tan<span class="sub">atan</span></button>
      <button class="k-fn fn-key" data-primary="log(" data-shift="10^(">log<span class="sub">10^x</span></button>
      <button class="k-fn fn-key" data-primary="ln(" data-shift="e^(">ln<span class="sub">e^x</span></button>
      <button class="k-fn" data-token="π">π</button>

      <button class="k-fn fn-key" data-primary="√(" data-shift="^2">√<span class="sub">x²</span></button>
      <button class="k-fn fn-key" data-primary="^(" data-shift="!">x^y<span class="sub">x!</span></button>
      <button class="k-fn" data-token="%">%</button>
      <button class="k-op" data-token="÷">÷</button>
      <button class="k-op" data-token="×">×</button>
      <button class="k-fn" data-action="ans">Ans</button>

      <button class="k-num" data-token="7">7</button>
      <button class="k-num" data-token="8">8</button>
      <button class="k-num" data-token="9">9</button>
      <button class="k-op" data-token="-">-</button>
      <button class="k-op" data-token="+">+</button>
      <button class="k-fn" data-action="negate">(-)</button>

      <button class="k-num" data-token="4">4</button>
      <button class="k-num" data-token="5">5</button>
      <button class="k-num" data-token="6">6</button>
      <button class="k-fn" data-token="e">e</button>
      <button class="k-fn" data-token="^(-1)">x⁻¹</button>
      <button class="k-fn" data-token="E">EXP</button>

      <button class="k-num" data-token="1">1</button>
      <button class="k-num" data-token="2">2</button>
      <button class="k-num" data-token="3">3</button>
      <button class="k-num" data-token="0">0</button>
      <button class="k-num" data-token=".">.</button>
      <button class="k-eq" data-action="equal">=</button>
    </section>
  </main>

  <script>
    const exprEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const shiftIndicator = document.getElementById("shift-ind");
    const modeIndicator = document.getElementById("mode-ind");
    const keys = document.querySelector(".keys");

    const modes = ["DEG", "RAD", "GRAD"];
    let modeIndex = 0;
    let shiftActive = false;
    let expression = "";
    let lastAnswer = 0;

    const factorial = (n) => {
      if (!Number.isFinite(n) || n < 0 || Math.floor(n) !== n) {
        throw new Error("Factorial requires non-negative integer");
      }
      let out = 1;
      for (let i = 2; i <= n; i += 1) out *= i;
      return out;
    };

    const toRadians = (value) => {
      const mode = modes[modeIndex];
      if (mode === "DEG") return (value * Math.PI) / 180;
      if (mode === "GRAD") return (value * Math.PI) / 200;
      return value;
    };

    const fromRadians = (value) => {
      const mode = modes[modeIndex];
      if (mode === "DEG") return (value * 180) / Math.PI;
      if (mode === "GRAD") return (value * 200) / Math.PI;
      return value;
    };

    const funcMap = {
      sin: (v) => Math.sin(toRadians(v)),
      cos: (v) => Math.cos(toRadians(v)),
      tan: (v) => Math.tan(toRadians(v)),
      asin: (v) => fromRadians(Math.asin(v)),
      acos: (v) => fromRadians(Math.acos(v)),
      atan: (v) => fromRadians(Math.atan(v)),
      log: (v) => Math.log10(v),
      ln: (v) => Math.log(v),
      sqrt: (v) => Math.sqrt(v),
      exp10: (v) => Math.pow(10, v),
      expE: (v) => Math.exp(v)
    };

    const insertImplicitMultiplication = (expr) => {
      return expr
        .replace(/(\d|\)|π|e)(?=\(|sin|cos|tan|asin|acos|atan|log|ln|√|10\^|e\^)/g, "$1*")
        .replace(/(\d|\)|π|e)(?=(\d|π|e))/g, "$1*")
        .replace(/\)(?=\d|π|e)/g, ")*");
    };

    const expandFactorial = (expr) => {
      let out = expr;
      const factPattern = /(\b\d+(\.\d+)?|\([^()]+\)|π|e)!/;
      while (factPattern.test(out)) {
        out = out.replace(factPattern, "factorial($1)");
      }
      return out;
    };

    const sanitizeExpression = (expr) => {
      let out = expr.replace(/\s+/g, "");
      out = insertImplicitMultiplication(out);
      out = expandFactorial(out);
      out = out
        .replace(/×/g, "*")
        .replace(/÷/g, "/")
        .replace(/π/g, "PI")
        .replace(/√\(/g, "sqrt(")
        .replace(/10\^\(/g, "exp10(")
        .replace(/e\^\(/g, "expE(")
        .replace(/\^/g, "**")
        .replace(/%/g, "/100");
      return out;
    };

    const formatNumber = (value) => {
      if (!Number.isFinite(value)) return "Math ERROR";
      const abs = Math.abs(value);
      if ((abs >= 1e10 || (abs > 0 && abs < 1e-8))) {
        return value.toExponential(8).replace(/\.?0+e/, "e");
      }
      const fixed = Number(value.toPrecision(12)).toString();
      return fixed;
    };

    const evaluateExpression = () => {
      if (!expression) return;
      try {
        const compiled = sanitizeExpression(expression);
        const fn = new Function(
          "PI",
          "e",
          "factorial",
          "sin",
          "cos",
          "tan",
          "asin",
          "acos",
          "atan",
          "log",
          "ln",
          "sqrt",
          "exp10",
          "expE",
          `return (${compiled});`
        );
        const value = fn(
          Math.PI,
          Math.E,
          factorial,
          funcMap.sin,
          funcMap.cos,
          funcMap.tan,
          funcMap.asin,
          funcMap.acos,
          funcMap.atan,
          funcMap.log,
          funcMap.ln,
          funcMap.sqrt,
          funcMap.exp10,
          funcMap.expE
        );
        if (!Number.isFinite(value)) throw new Error("Math error");
        lastAnswer = value;
        resultEl.textContent = formatNumber(value);
      } catch {
        resultEl.textContent = "Math ERROR";
      }
    };

    const updateDisplay = () => {
      exprEl.textContent = expression;
      if (!expression) {
        resultEl.textContent = "0";
      }
      modeIndicator.textContent = modes[modeIndex];
      shiftIndicator.classList.toggle("active", shiftActive);
    };

    const consumeShift = () => {
      if (shiftActive) {
        shiftActive = false;
      }
    };

    const appendToken = (token) => {
      expression += token;
      evaluateExpression();
      updateDisplay();
    };

    const handleAction = (action) => {
      if (action === "shift") {
        shiftActive = !shiftActive;
        updateDisplay();
        return;
      }
      if (action === "drg") {
        modeIndex = (modeIndex + 1) % modes.length;
        evaluateExpression();
        updateDisplay();
        return;
      }
      if (action === "ac") {
        expression = "";
        resultEl.textContent = "0";
        consumeShift();
        updateDisplay();
        return;
      }
      if (action === "del") {
        expression = expression.slice(0, -1);
        evaluateExpression();
        consumeShift();
        updateDisplay();
        return;
      }
      if (action === "ans") {
        appendToken(formatNumber(lastAnswer));
        consumeShift();
        updateDisplay();
        return;
      }
      if (action === "negate") {
        appendToken("(-");
        consumeShift();
        return;
      }
      if (action === "equal") {
        evaluateExpression();
        if (resultEl.textContent !== "Math ERROR") {
          expression = resultEl.textContent;
        }
        consumeShift();
        updateDisplay();
      }
    };

    keys.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;

      const action = btn.dataset.action;
      if (action) {
        handleAction(action);
        return;
      }

      if (btn.classList.contains("fn-key")) {
        const token = shiftActive ? btn.dataset.shift : btn.dataset.primary;
        appendToken(token);
        consumeShift();
        updateDisplay();
        return;
      }

      const token = btn.dataset.token;
      if (token) {
        appendToken(token);
        consumeShift();
        updateDisplay();
      }
    });

    window.addEventListener("keydown", (event) => {
      const map = {
        Enter: "equal",
        "=": "equal",
        Backspace: "del",
        Escape: "ac",
        "*": "×",
        "/": "÷",
        x: "×",
        X: "×",
        p: "π",
        P: "π"
      };

      if (map[event.key] === "equal" || map[event.key] === "del" || map[event.key] === "ac") {
        event.preventDefault();
        handleAction(map[event.key]);
        return;
      }

      if (map[event.key]) {
        event.preventDefault();
        appendToken(map[event.key]);
        return;
      }

      const valid = "0123456789.+-()^%";
      if (valid.includes(event.key)) {
        appendToken(event.key);
      }
    });

    updateDisplay();
  </script>
</body>
</html>
